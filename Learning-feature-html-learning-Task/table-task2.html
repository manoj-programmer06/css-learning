<!DOCTYPE html>
<html>
    <head>
        <title>Table Border Example</title>
    </head>
    <body>
        <a href="./table-task.html"><img src="./asserts/batten/2.png" alt="previous" width="75px" height="75px"></a>
        <h1><span style="color: rgb(255, 115, 0);">Table rowspan Example</span></h1>
        <table border="3" width="75%" height="75%" align="center">
            <tr>
                <th>Sl. No.</th>
                <th>student name</th>
                <th colspan="5">subject marks</th>
            </tr>
            <tr>
                <th>Sl. No.</th>
                <th>First Name</th>
                <th>Tamil</th>
                <th>Science</th>
                <th>English</th>
                <th>Math</th>
                <th>Social Studies</th>
            </tr>
            <tr>
                <td>1</td>
                <td>vijay</td>
                <td>50</td>
                <td>60</td>
                <td>70</td>
                <td>80</td>
                <td>90</td>
            </tr>
            <tr>
                <td>2</td>
                <td rowspan="2">john</td>   
                <td>60</td>
                <td>70</td>
                <td>80</td>
                <td>90</td>
                <td>100</td>
            </tr>
            <tr>
                <td>3</td>
                <td>70</td>
                <td>80</td>
                <td>90</td>
                <td>100</td>
                <td><span style="color: rgb(255, 0, 21);">35</span></td>

            </tr>
        </table><br>
        <h3> <center><span style="color: rgb(255, 115, 0);">Table with colspan </span></h3>
            <center>
        <a href="./table-task3.html"><img src="./asserts/batten/1.png" alt="next" width="75px" height="75px"> </a>
        </center>
        
    </body>
</html>
