<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href="../css/gs-childselector.css">
</head>
<body>
    <div class="container1">
        <h1>My Page</h1>
        <p>This is a simple page created with HTML.</p>
    </div>
    <div class="container2">
        <h2>Another Section</h2>
        <p>This is another section of the page.</p>
        <div class="first child">
            <h2>Inner Section</h2>
            <p>This is an inner section.</p>
        </div>
    </div>
</body>
</html>
